services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: airtickets
      POSTGRES_USER: airtickets
      POSTGRES_PASSWORD: airtickets
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db:/db:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airtickets -d airtickets"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: docker
      HTTP_ADDR: 0.0.0.0:8080
      DB_DSN: postgres://airtickets:airtickets@db:5432/airtickets?sslmode=disable
      JWT_ISSUER: airtickets
      JWT_SECRET: dev_super_secret_change_me
      JWT_TTL_MINUTES: "15"
      REFRESH_TTL_DAYS: "14"
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GOOGLE_REDIRECT_URL: ${OAUTH_GOOGLE_REDIRECT_URL:-http://localhost:8080/api/auth/oauth/google/callback}
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
